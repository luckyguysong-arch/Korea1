<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>영어 단어 카드</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      width: 360px;
      max-width: 100%;
      background: white;
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    #image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 18px;
      background: #eeeeee;
    }

    h1 {
      font-size: 42px;
      margin: 24px 0 8px;
    }

    .meaning {
      font-size: 26px;
      color: #555555;
      margin-bottom: 20px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      margin: 6px;
      font-size: 18px;
      cursor: pointer;
      background: #111111;
      color: white;
    }

    button:active {
      transform: scale(0.97);
    }

    .nav {
      display: flex;
      justify-content: center;
      margin-top: 10px;
    }

    .nav button {
      width: 120px;
      background: #4f46e5;
    }

    .count {
      margin-top: 14px;
      color: #777777;
    }
  </style>
</head>

<body>

  <div class="app">

    <img
      id="image"
      src=""
      alt="영어 단어 이미지"
    />

    <h1 id="word"></h1>

    <div
      class="meaning"
      id="meaning"
    ></div>

    <button onclick="speak()">
      🔊 발음 듣기
    </button>

    <div class="nav">

      <button onclick="prevCard()">
        이전
      </button>

      <button onclick="nextCard()">
        다음
      </button>

    </div>

    <div
      class="count"
      id="count"
    ></div>

  </div>
<script>
const cards = [
  {
    word: "airplane",
    meaning: "비행기",
    image: "images/transport/airplane.jpg"
  },
  {
    word: "bus",
    meaning: "버스",
    image: "images/transport/bus.jpg"
  },
  {
    word: "train",
    meaning: "기차",
    image: "images/transport/train.jpg"
  },
  {
    word: "cruise ship",
    meaning: "크루즈선",
    image: "images/transport/cruise ship.jpg"
  },
  {
    word: "ysp",
    meaning: "양상필",
    image: "images/transport/ysp.jpg"
  },
  {
    word: "ktw",
    meaning: "김태욱",
    image: "images/transport/ktw.jpg"
  },
];

    let current = 0;

    const imageElement =
      document.getElementById("image");

    const wordElement =
      document.getElementById("word");

    const meaningElement =
      document.getElementById("meaning");

    const countElement =
      document.getElementById("count");

    function showCard() {
      const card = cards[current];

      imageElement.src = card.image;
      wordElement.textContent = card.word;
      meaningElement.textContent = card.meaning;

      countElement.textContent =
        `${current + 1} / ${cards.length}`;
    }

    function nextCard() {
      current++;

      if (current >= cards.length) {
        current = 0;
      }

      showCard();
    }

    function prevCard() {
      current--;

      if (current < 0) {
        current = cards.length - 1;
      }

      showCard();
    }

    function speak() {
      if (!("speechSynthesis" in window)) {
        alert("이 기기에서는 음성 기능을 지원하지 않습니다.");
        return;
      }

      window.speechSynthesis.cancel();

      const speech =
        new SpeechSynthesisUtterance(
          cards[current].word
        );

      speech.lang = "en-US";
      speech.rate = 0.85;
      speech.pitch = 1;

      window.speechSynthesis.speak(speech);
    }

    imageElement.onerror = function () {
      imageElement.alt =
        "이미지를 불러올 수 없습니다.";

      console.error(
        "이미지 경로를 확인하세요:",
        cards[current].image
      );
    };

    showCard();
  </script>

</body>
</html>
